name: Build and Push Docker Images

on:
  push:
    branches:
      - main
    paths:
      - 'docker-bake.hcl'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest -v --tb=short

  detect-changes:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.extract.outputs.release }}
      app: ${{ steps.extract.outputs.app }}
      registry_user: ${{ steps.extract.outputs.registry_user }}
      registry_owner: ${{ steps.extract.outputs.registry_owner }}
      cuda_version_124: ${{ steps.extract.outputs.cuda_version_124 }}
      cuda_version_128: ${{ steps.extract.outputs.cuda_version_128 }}
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Extract variables from docker-bake.hcl
        id: extract
        run: |
          RELEASE=$(grep 'variable "RELEASE"' -A 2 docker-bake.hcl | grep 'default' | sed 's/.*"\(.*\)"/\1/')
          APP=$(grep 'variable "APP"' -A 2 docker-bake.hcl | grep 'default' | sed 's/.*"\(.*\)"/\1/')
          REGISTRY_USER=$(grep 'variable "REGISTRY_USER"' -A 2 docker-bake.hcl | grep 'default' | sed 's/.*"\(.*\)"/\1/')
          CUDA_VERSION_124=$(grep 'variable "CUDA_VERSION_124"' -A 2 docker-bake.hcl | grep 'default' | sed 's/.*"\(.*\)"/\1/')
          CUDA_VERSION_128=$(grep 'variable "CUDA_VERSION_128"' -A 2 docker-bake.hcl | grep 'default' | sed 's/.*"\(.*\)"/\1/')
          REGISTRY_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')

          echo "release=${RELEASE}" >> $GITHUB_OUTPUT
          echo "app=${APP}" >> $GITHUB_OUTPUT
          echo "registry_user=${REGISTRY_USER}" >> $GITHUB_OUTPUT
          echo "registry_owner=${REGISTRY_OWNER}" >> $GITHUB_OUTPUT
          echo "cuda_version_124=${CUDA_VERSION_124}" >> $GITHUB_OUTPUT
          echo "cuda_version_128=${CUDA_VERSION_128}" >> $GITHUB_OUTPUT

          echo "Current RELEASE: ${RELEASE}"
          echo "Current APP: ${APP}"
          echo "Current REGISTRY_USER: ${REGISTRY_USER}"
          echo "CUDA_VERSION_124: ${CUDA_VERSION_124}"
          echo "CUDA_VERSION_128: ${CUDA_VERSION_128}"

      - name: Check if RELEASE changed
        id: check
        run: |
          # For manual triggers, always build
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "Manual trigger - will build"
            exit 0
          fi

          # Check if docker-bake.hcl was modified
          if ! git diff HEAD^ HEAD --name-only | grep -q "docker-bake.hcl"; then
            echo "should_build=false" >> $GITHUB_OUTPUT
            echo "docker-bake.hcl not modified - skipping build"
            exit 0
          fi

          # Get RELEASE value from current commit
          CURRENT_RELEASE=$(grep 'variable "RELEASE"' -A 2 docker-bake.hcl | grep 'default' | sed 's/.*"\(.*\)"/\1/')

          # Get RELEASE value from previous commit
          git show HEAD^:docker-bake.hcl > /tmp/docker-bake-prev.hcl
          PREV_RELEASE=$(grep 'variable "RELEASE"' -A 2 /tmp/docker-bake-prev.hcl | grep 'default' | sed 's/.*"\(.*\)"/\1/')

          echo "Previous RELEASE: ${PREV_RELEASE}"
          echo "Current RELEASE: ${CURRENT_RELEASE}"

          # Compare RELEASE values
          if [ "${PREV_RELEASE}" != "${CURRENT_RELEASE}" ]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "RELEASE changed from '${PREV_RELEASE}' to '${CURRENT_RELEASE}' - will build"
          else
            # Also check for any other relevant changes (APP, REGISTRY_USER, or structural changes)
            if git diff HEAD^ HEAD docker-bake.hcl | grep -E '^\+|^\-' | grep -v '^+++\|^---' | grep -q .; then
              echo "should_build=true" >> $GITHUB_OUTPUT
              echo "Other changes detected in docker-bake.hcl - will build"
            else
              echo "should_build=false" >> $GITHUB_OUTPUT
              echo "No significant changes detected - skipping build"
            fi
          fi

  build-and-push:
    needs: [test, detect-changes]
    if: needs.detect-changes.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      # Keep this matrix in sync with the CUDA targets in docker-bake.hcl.
      matrix:
        include:
          - cuda_version: 12.4.1
            cuda_short: cu124
            torch_version: 2.6.0
            xformers_version: 0.0.29.post3
            python_version: "3.10"
          - cuda_version: 12.8.1
            cuda_short: cu128
            torch_version: 2.10.0
            xformers_version: 0.0.34
            python_version: "3.10"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          echo "=== Before cleanup ==="
          df -h /

          # Remove swap
          sudo swapoff -a
          sudo rm -f /swapfile

          # Remove large pre-installed tools and frameworks
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost /opt/hostedtoolcache /usr/share/swift \
            /usr/local/.ghcup /usr/local/graalvm /usr/local/share/powershell \
            /usr/local/share/chromium /usr/local/lib/node_modules

          # Remove pre-installed apt packages we don't need
          sudo apt-get purge -y \
            dotnet-* aspnetcore-* azure-cli google-cloud-cli \
            firefox mysql-* postgresql-* mongodb-* moby-* \
            powershell php* snapd google-chrome-stable microsoft-edge-stable \
            2>/dev/null || true
          sudo apt-get autoremove -y
          sudo apt-get clean

          # Remove pre-cached docker images
          docker image prune -af

          echo "=== After cleanup ==="
          df -h /

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host
          buildkitd-flags: --debug

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push CUDA ${{ matrix.cuda_version }} image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          sbom: true
          provenance: true
          cache-from: type=gha,scope=${{ matrix.cuda_short }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cuda_short }}
          tags: ghcr.io/${{ needs.detect-changes.outputs.registry_owner }}/${{ needs.detect-changes.outputs.app }}:${{ needs.detect-changes.outputs.release }}-cuda${{ matrix.cuda_version }}
          build-args: |
            CUDA_VERSION=${{ matrix.cuda_version }}
            TORCH_VERSION=${{ matrix.torch_version }}
            XFORMERS_VERSION=${{ matrix.xformers_version }}
            CUDA_SHORT=${{ matrix.cuda_short }}
            PYTHON_VERSION=${{ matrix.python_version }}

      - name: Verify image was pushed
        run: |
          IMAGE="ghcr.io/${{ needs.detect-changes.outputs.registry_owner }}/${{ needs.detect-changes.outputs.app }}:${{ needs.detect-changes.outputs.release }}-cuda${{ matrix.cuda_version }}"
          echo "Verifying image: $IMAGE"
          docker manifest inspect "$IMAGE" > /dev/null && echo "✅ SUCCESS: Image verified: $IMAGE" || (echo "❌ FAILED: Image not found: $IMAGE"; exit 1)

  create-summary:
    needs: [detect-changes, build-and-push]
    if: needs.detect-changes.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Build image list
        id: list-images
        run: |
          RELEASE="${{ needs.detect-changes.outputs.release }}"
          APP="${{ needs.detect-changes.outputs.app }}"
          REGISTRY_OWNER="${{ needs.detect-changes.outputs.registry_owner }}"
          CUDA_124="${{ needs.detect-changes.outputs.cuda_version_124 }}"
          CUDA_128="${{ needs.detect-changes.outputs.cuda_version_128 }}"

          IMAGE_124="ghcr.io/${REGISTRY_OWNER}/${APP}:${RELEASE}-cuda${CUDA_124}"
          IMAGE_128="ghcr.io/${REGISTRY_OWNER}/${APP}:${RELEASE}-cuda${CUDA_128}"
          IMAGES_JSON=$(echo "[\"${IMAGE_124}\", \"${IMAGE_128}\"]" | jq -c '.')

          echo "image_124=${IMAGE_124}" >> $GITHUB_OUTPUT
          echo "image_128=${IMAGE_128}" >> $GITHUB_OUTPUT
          echo "images_json=${IMAGES_JSON}" >> $GITHUB_OUTPUT

          echo "${IMAGE_124}" > built-images.txt
          echo "${IMAGE_128}" >> built-images.txt
          echo "${IMAGES_JSON}" > built-images.json

      - name: Upload image list artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docker-images-list
          path: |
            built-images.txt
            built-images.json
          retention-days: 90

      - name: Create job summary
        run: |
          {
            echo "## Docker Images Built"
            echo ""
            echo "**Application:** ${{ needs.detect-changes.outputs.app }}"
            echo "**Release:** ${{ needs.detect-changes.outputs.release }}"
            echo ""
            echo "### Images Pushed to GitHub Container Registry:"
            echo '```'
            echo "${{ steps.list-images.outputs.image_124 }}"
            echo "${{ steps.list-images.outputs.image_128 }}"
            echo '```'
            echo ""
            echo "### CUDA Versions:"
            echo "| CUDA | Torch | xformers |"
            echo "|------|-------|----------|"
            echo "| 12.4 | 2.6.0 | 0.0.29.post3 |"
            echo "| 12.8 | 2.10.0 | 0.0.34 |"
            echo ""
            echo "### To pull these images:"
            echo '```bash'
            echo "# CUDA 12.4"
            echo "docker pull ${{ steps.list-images.outputs.image_124 }}"
            echo ""
            echo "# CUDA 12.8"
            echo "docker pull ${{ steps.list-images.outputs.image_128 }}"
            echo '```'
            echo ""
            echo "**Note:** If the images are private, make them public at:"
            echo "https://github.com/${{ github.repository_owner }}?tab=packages"
          } >> $GITHUB_STEP_SUMMARY
